site_name: lasusie
site_description: Generalized SuSiE fine-mapping in JAX
repo_name: lasusie

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Install: index.md
  - Overview:
      - Model: overview/model.md
      - Algorithm: overview/algorithm.md
      - Built-in likelihoods: overview/likelihoods.md
  - Extending:
      - Overview: extending/index.md
      - Adding a likelihood: extending/likelihood.md
      - Adding a design: extending/design.md
      - Adding a prior: extending/prior.md
  - API Reference: api.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            merge_init_into_class: true
            members_order: source

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
